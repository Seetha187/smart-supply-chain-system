services:
  backend:
    build:
      context: ./backend
    container_name: smart-supply-chain-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
    ports:
      - "5000:5000"
    networks:
      - supply-chain

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: smart-supply-chain-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - supply-chain

networks:
  supply-chain:
    driver: bridge
